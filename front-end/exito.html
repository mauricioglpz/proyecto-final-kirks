<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pago Exitoso - Doggie Chic Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f5f7fa; text-align: center; margin: 0;">
    
    <div style="background: white; padding: 40px; border-radius: 18px; box-shadow: 0 5px 20px rgba(0,0,0,0.1);">
        <h1 style="color: #28a745; margin-bottom: 10px;">¡Pago Exitoso!</h1>
        <p style="color: #3A3D46;">Tu compra de prueba se ha procesado correctamente.</p>
        <a href="index.html" style="display: inline-block; margin-top: 20px; padding: 12px 24px; background: #0A8CEF; color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">Volver al inicio</a>
    </div>

    <script>
        localStorage.removeItem("doggie_cart_shop_v1");
    </script>

    <script src="script.js"></script>
<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const token = localStorage.getItem('token');
        
        // 1. Leemos la compra pendiente que guardamos antes de ir a Stripe
        const itemsString = localStorage.getItem('compra_pendiente');
        let items = [];
        
        try {
            if (itemsString) items = JSON.parse(itemsString);
        } catch(e) {}

        // 2. Si hay productos pendientes y el usuario está logueado, mandamos el correo
        if (items.length > 0 && token) {
            try {
                const respuesta = await fetch('/api/pagos/confirmar-compra', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ items })
                });

                if (respuesta.ok) {
                    console.log("¡Compra confirmada en base de datos y correo enviado!");
                    // 3. Limpiamos la memoria temporal y el carrito real
                    localStorage.removeItem('compra_pendiente');
                    window.setCart([]);
                }
            } catch (error) {
                console.error("Error al confirmar la compra:", error);
            }
        }
    });
</script>

</body>
</html>
