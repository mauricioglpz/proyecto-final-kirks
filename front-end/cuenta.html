<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">

    <style>
        /* ===== PÁGINA ===== */
        .cuenta-page {
            padding: 50px 20px 100px;
            min-height: 60vh;
        }

        .page-title {
            font-size: 42px;
            color: #1D1E23;
            text-align: center;
            margin-bottom: 40px;
            font-weight: 900;
        }

        .compras-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
            margin-top: 10px;
        }

        /* ===== TICKET CARD ===== */
        .compra-box {
            background: #fff;
            border-radius: 18px;
            padding: 0;
            box-shadow: 0 8px 28px rgba(0,0,0,.08);
            border-top: 4px solid #0A8CEF;
            overflow: hidden;
            transition: transform .2s, box-shadow .2s;
        }

        .compra-box:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 36px rgba(0,0,0,.13);
        }

        .compra-servicio {
            border-top-color: #28a745;
        }

        /* ── Header del ticket ── */
        .ticket-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 20px 14px;
            gap: 12px;
        }

        .ticket-header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .ticket-orden {
            display: block;
            font-size: 15px;
            font-weight: 800;
            color: #1D1E23;
        }

        .ticket-fecha {
            display: block;
            font-size: 12px;
            color: #888;
            font-weight: 600;
            margin-top: 2px;
        }

        .ticket-badge {
            background: #E6F3FF;
            color: #076FBE;
            font-size: 11px;
            font-weight: 800;
            padding: 5px 10px;
            border-radius: 999px;
            white-space: nowrap;
        }

        /* ── Divisor ── */
        .ticket-divider {
            height: 1px;
            background: #f0f0f0;
            margin: 0 20px;
        }

        /* ── Filas de productos ── */
        .ticket-productos {
            padding: 12px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .ticket-row {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 10px;
        }

        .ticket-row-name {
            font-size: 14px;
            font-weight: 600;
            color: #3A3D46;
            flex: 1;
            line-height: 1.3;
        }

        .ticket-qty {
            display: inline-block;
            background: #E6F3FF;
            color: #076FBE;
            font-weight: 800;
            font-size: 12px;
            padding: 2px 7px;
            border-radius: 6px;
            margin-right: 6px;
        }

        .ticket-row-price {
            font-size: 14px;
            font-weight: 800;
            color: #1D1E23;
            white-space: nowrap;
        }

        /* ── Total ── */
        .ticket-total-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 20px;
            gap: 10px;
        }

        .ticket-total-label {
            font-size: 14px;
            font-weight: 700;
            color: #3A3D46;
        }

        .ticket-total-monto {
            font-size: 18px;
            font-weight: 900;
            color: #0A8CEF;
        }

        /* ── Estado envío ── */
        .estado-envio {
            margin: 0;
            background: #E6F3FF;
            color: #076FBE;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 10px;
            border-radius: 0 0 16px 16px;
        }

        .estado-envio i { font-size: 18px; }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            text-align: center;
            padding: 50px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 5px 20px rgba(0,0,0,.05);
            grid-column: 1 / -1;
        }

        .empty-state h3 {
            font-size: 22px;
            color: #1D1E23;
            margin-bottom: 12px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .compras-grid { grid-template-columns: 1fr; }
            .page-title { font-size: 30px; }
        }

        /* ===== Header heredado ===== */
        #carrito-btn { display:flex; align-items:center; gap:6px; position:relative; text-decoration:none; cursor:pointer; }
        #cartCount { background:#ff4d4d; color:#fff; border-radius:50%; padding:1px 6px; font-size:11px; font-weight:800; min-width:18px; text-align:center; line-height:18px; }
        .menu-actions { display:flex; align-items:center; gap:15px; }
    </style>
</head>
